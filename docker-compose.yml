services:

  db:
    image: postgres:17
    container_name: paladart-db

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - paladart_data:/var/lib/postgresql/data
      - ./docker/init/paladart.sql:/docker-entrypoint-initdb.d/01-paladart.sql:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5


  app:
    build: .
    container_name: paladart-app

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "8080:8080"


volumes:
  paladart_data: